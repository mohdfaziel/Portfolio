<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Projects</title>
    <link rel="icon" type="image/x-icon" href="assets/fevicon.png">
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <style>
        section {
            min-height: fit-content;
            padding: 3rem 9% 3rem;
        }

        .projects h2 {
            margin-bottom: 3rem;
        }
    </style>
</head>

<body>
    <section class="projects" id="projects">
        <h2 class="heading">Mini-Projects</h2>
        <div class="projects-container">
            <div class="projects-box">
                <i class='bx bx-images'></i>
                <h3>Image Finder</h3>
                <p>Search images by keywords</p>
                <div class="links">
                    <a href="https://image-generator-mf.vercel.app/" target="_blank"><i
                            class="bx bx-link-external"></i></a>
                    <a href="https://github.com/mohdfaziel/Image-Generator" target="_blank"><i
                            class='bx bxl-github'></i></a>
                </div>
            </div>
            <div class="projects-box">
                <i class='bx bx-cloud'></i>
                <h3>Sky-Watch</h3>
                <p>Your daily forecast, simplified</p>
                <div class="links">
                    <a href="https://sky-watch-mf.vercel.app/" target="_blank"><i
                            class="bx bx-link-external"></i></a>
                    <a href="https://github.com/mohdfaziel/SkyWatch" target="_blank"><i
                            class='bx bxl-github'></i></a>
                </div>
            </div>
            <div class="projects-box">
                <i class='bx bxl-github'></i>
                <h3>Github Profile Viewer</h3>
                <p>Search and view GitHub profiles</p>
                <div class="links">
                    <a href="https://github-profile-viewer-mf.vercel.app/" target="_blank"><i
                            class="bx bx-link-external"></i></a>
                    <a href="https://github.com/mohdfaziel/Github-Profile-Viewer" target="_blank"><i
                            class='bx bxl-github'></i></a>
                </div>
            </div>
            <div class="projects-box">
                <img class="icon" src="assets/icons8-checklist-96.png" alt="">
                <h3>To-Do List</h3>
                <p>Your Daily Action Plan</p>
                <div class="links">
                    <a href="https://to-do-list-mf.vercel.app/" target="_blank"><i
                            class="bx bx-link-external"></i></a>
                    <a href="https://github.com/mohdfaziel/ToDo_List" target="_blank"><i
                            class='bx bxl-github'></i></a>
                </div>
            </div>
            <div class="projects-box">
                <img class="icon" src="assets/tic-tac-toe.png" alt="">
                <h3>Tic-Tac-Toe</h3>
                <p>Interactive Tic Tac Toe game</p>
                <div class="links">
                    <a href="https://tictactoe-mf.vercel.app/" target="_blank"><i class="bx bx-link-external"></i></a>
                    <a href="https://github.com/mohdfaziel/Tic-Tac-Toe" target="_blank"><i
                            class='bx bxl-github'></i></a>
                </div>
            </div>
            <div class="projects-box">
                <img class="icon" src="assets/icons8-password-96.png" alt="">
                <h3>Password-Generator</h3>
                <p>User-friendly password generator</p>
                <div class="links">
                    <a href="https://password-generator-mf.vercel.app/" target="_blank"><i
                            class="bx bx-link-external"></i></a>
                    <a href="https://github.com/mohdfaziel/Password-Generator" target="_blank"><i
                            class='bx bxl-github'></i></a>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
